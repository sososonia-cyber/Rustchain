global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  # Scrape metrics directly from RustChain node /metrics endpoint
  - job_name: 'rustchain-node'
    static_configs:
      - targets: ['rustchain-node:5000']
    metrics_path: /metrics
    scrape_interval: 30s
  # Scrape from standalone exporter (optional)
  - job_name: 'rustchain-exporter'
    static_configs:
      - targets: ['rustchain-exporter:9100']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Alert rules
rule_files:
  - 'alerts.yml'
